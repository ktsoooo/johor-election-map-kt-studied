<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>Johor PRN Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet"
href="style.css"/>

</head>

<body>

<div id="container">

    <div id="map"></div>

    <div id="sidebar">

        <h2>Johor Election Explorer</h2>

        <div id="year-selector">
            Year Selector: 
            <button id="btn2022">PRN 2022</button>
            <button id="btn2026">PRN 2026</button>
        </div>

        <div><hr></div>

        <div id="search-container">

        <input
        type="text"
        id="searchBox"
        placeholder="Search DUN or Winner Name..."
        autocomplete="off">

        <div id="searchResults"></div>

        </div>

        <div id="info">

            <h3>DUN</h3>

            Select a Polygon.

        </div>

        <div id="legend">
            <!-- Legend later -->
        </div>

        <button id="resetBtn">Clear Selection</button>

        <div id="footer">
        <hr>
        <p><strong>Johor Election Explorer</strong></p>
        <p>Election Results: PRU 2026 & 2022</p>
        <p>Source: SPR Malaysia</p>
        <p>Basemap: OpenStreetMap / Esri</p>
        <p>Developed by Soo Kai Ting</p>
        <p>Last Updated: 14 July 2026</p>
        </div>

    </div>


</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="script.js"></script>

</body>

</html>
